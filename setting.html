<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出勤簿設定</title>

    <style>

.back-button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #f5f5f5;
    color: #333;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    margin: 20px;
}

.back-button:hover {
    background: #e0e0e0;
    border-color: #bbb;
}

.title{
        text-align: center;
        font-size: 35px; 
        font-weight: bold;
        margin-left: 40px;
    }

    .option{
        font-size: 15px;
        padding: 10px;
        display: flex;
        text-align: center;
        flex-direction: column;
        align-items: center;  
        white-space: nowrap;   
    }

    th {
        border-collapse: separate;
        padding:10px 30px;
        color: white;;
        margin-right: 20px;
        padding-right: 30px;
    }

    .bikou-div{
        background-color: #413f3f;
        border-radius: 6px; 
        padding: 10px 20px 20px 20px;
        margin-top: 40px;


    }

    .home{
        color: white;
        padding: 10px;
        border-radius: 6px;      
    }

        .bikou{
        color: white;
        padding: 10px;
        border-radius: 6px;      
    }

    .home-div {
        background-color: #413f3f;
        border-radius: 6px; 
        padding: 10px 20px 20px 20px;
    }


input[type="button"], 
input[type="submit"], 
input[type="reset"] {
    background-color: transparent;       
    color: white;
    font-weight: bold ;   
    border-radius: 6px; 
    margin: 5px;
    padding: 7px 20px;
    background-color: #333;
    font-size: 15px;   
    -webkit-appearance: none;
    appearance: none;
    background-image: none;
    box-shadow: none;
    border: none;
}


    input[type="button"]:hover, 
    input[type="submit"]:hover, 
    input[type="reset"]:hover {
    background-color: transparent;      
    color: white;
    font-weight: bold ;   
    border-radius: 6px; 
    margin: 5px;
    padding: 7px 20px;
    background-color: #575757;  
    font-size: 15px;   
    }

    .home-table {
        background-color: #757575;
        padding-right: 30px;
        border-radius: 10px; 
        padding: 10px;
        padding-left: 0px;
    } 
    
    .bikou-table {
        background-color: #757575;
        padding-right: 30px;
        border-radius: 10px; 
        padding: 10px;
        padding-left: 0px;
        margin-top: 20px;
    }  

    .code-table {
        background-color: #757575;
        padding-right: 30px;
        border-radius: 10px; 
        padding: 10px;
        padding-left: 0px;
        margin-top: 20px;
    }

    .code-div {
        background-color: #413f3f;
        border-radius: 6px; 
        padding: 10px 20px 20px 20px;
        margin-top: 40px;
    }

    .all-div {
        display: flex;
        flex-direction: column;
        gap: 0;
        align-items: center;
    }
    
      header {
    display: flex;
    align-items: center;           
    padding: 25px 20px;
    margin-bottom:50px;
    border-bottom: 1px solid #7e7d7d;  
      }

        .back {
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    background: none;
    border: 1px solid #000;
    border-radius: 4px;
    font-style: normal;
    text-decoration: none;
    color: black;
    font-weight: bold;
  }


  @media screen and (min-width: 768px) {

      .title{
        text-align: center;
        font-size: 40px; 
        font-weight: bold;
        margin-left: 20px;
    }

    .option{
        font-size: 20px;
        padding: 10px;
        display: flex;
        text-align: center;
        flex-direction: column;
        align-items: center;    
    }

    th {
        border-collapse: separate;
        padding:10px 30px;
        color: white;;
        margin-right: 20px;
        padding-right: 80px;
        font-size: 30px;
    }


    .bikou{
        color: white;
        padding: 10px;
        border-radius: 6px; 
    }

    .bikou-div{
        background-color: #413f3f;
        border-radius: 6px; 
        padding: 10px 20px 20px 20px;
        margin-top: 0px;

    }

    .home{

        color: white;
        padding: 10px;
        border-radius: 6px;      
    }

    .home-div {
        background-color: #413f3f;
        border-radius: 6px; 
        padding: 10px 20px 20px 20px;
    }



  .back {
    font-size: 20px;
    padding: 5px 10px;
    cursor: pointer;
    background: none;
    border: 1px solid #000;
    border-radius: 4px;
    font-style: normal;
    text-decoration: none;
    color: black;
    font-weight: bold;
  }

    .back:hover {
    font-size: 20px;
    padding: 5px 10px;
    cursor: pointer;
    background: none;
    border: 1px solid #000;
    border-radius: 4px;
    font-style: normal;
    text-decoration: none;
    color: #807e7e;
    font-weight: bold;
  }


input[type="button"], 
input[type="submit"], 
input[type="reset"] {
    background-color: transparent;       
    color: white;
    font-weight: bold ;   
    border-radius: 6px; 
    margin: 10px;
    padding: 7px 20px;
    background-color: #333;
    font-size: 20px;   
    -webkit-appearance: none;
    appearance: none;
    background-image: none;
    box-shadow: none;
    border: none;
}


    input[type="button"]:hover, 
    input[type="submit"]:hover, 
    input[type="reset"]:hover {
    background-color: transparent;      
    color: white;
    font-weight: bold ;   
    border-radius: 6px; 
    margin: 10px;
    padding: 7px 20px;
    background-color: #575757;  
    font-size: 20px;   
    }

    .home-table {
        background-color: #757575;
        padding-right: 30px;
        border-radius: 10px; 
        padding: 20px;
        padding-left: 60px;
    }

    .bikou-table {
        background-color: #757575;
        padding-right: 30px;
        border-radius: 10px; 
        padding: 20px;
        padding-left: 60px;
        margin-top: 0px;
    }

    .code-table {
        background-color: #757575;
        padding-right: 30px;
        border-radius: 10px; 
        padding: 20px;
        padding-left: 60px;
        margin-top: 0px;
    }

    .code-div {
        background-color: #413f3f;
        border-radius: 6px; 
        padding: 10px 20px 20px 20px;
        margin-top: 0px;
    }

    .all-div {
        display: flex;        
        gap: 24px;            
        justify-content: center; 
        flex-wrap: wrap;
        align-items: stretch;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .home-div, .bikou-div, .code-div {
        flex: 1 1 0;
        min-width: 350px;
        max-width: 450px;
    }

  header {
    display: flex;
    align-items: center;           
    padding: 25px 20px;
    margin-bottom:50px;
    border-bottom: 1px solid #7e7d7d;  
  }
  }


    </style>
</head>
<body>
 <header>
    <a href="#" class="back" id="back-btn">←戻る</a>
    <div class="title">設定画面</div>
 </header>
    <form action="" class="option">
         <div class="all-div">
            <div class="home-div">
            <h2 class="home">ホーム管理</h2>
            <table class="home-table">
                <!-- ホームはJavaScriptで動的に追加されます -->
            </table>
        </div>
            <div class="bikou-div">
                    <h2 class="bikou">備考欄テンプレート管理</h2> 
            <table class="bikou-table">
                <tr>
                    <th>備考を追加</th>
                    <td class="td">
                        <input class="bikou-tuika" type="button" value="追加">
                    </td>
                </tr>
                <!-- 以下のテンプレートはJavaScriptで動的に追加されます -->
            </table>
        </div>
        <div class="code-div">
            <h2 class="home">シフトコード管理</h2>
            <table class="code-table">
                <tr>
                    <th>コードを追加</th>
                    <td class="td">
                        <input class="code-tuika" type="button" value="追加">
                    </td>
                </tr>
                <!-- シフトコードはJavaScriptで動的に追加されます -->
            </table>
        </div>
        </div>
    </form>
    
    <!-- API設定を先に読み込む -->
    <script src="config.js"></script>
    <!-- 認証スクリプト -->
    <script src="auth.js"></script>
    <!-- 設定画面スクリプト -->
    <script src="setting.js"></script>
    
    <script>
        // ページ読み込み時の認証チェック
        document.addEventListener('DOMContentLoaded', async () => {
            // 認証チェック
            if (typeof PageRouter !== 'undefined') {
                const hasAccess = await PageRouter.checkPageAccess();
                if (!hasAccess) {
                    return; // 認証失敗時は処理を中断
                }
            }
            
            // ユーザー情報を表示
            const user = AUTH ? AUTH.getUser() : null;
            if (user) {
                console.log('👤 ログインユーザー:', user.name, `(${user.role})`);
            }
            
            // 戻るボタンのイベントリスナーを追加
            const backBtn = document.getElementById('back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    goBack();
                });
            }
        });
    </script>
</body>
</html>
</html>
