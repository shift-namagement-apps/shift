<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト希望提出</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
            background-color: #f0f2f5;
            color: #212529;
            font-size: 14px;
        }

        /* ヘッダー */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 1rem 1.5rem;
            border-radius: 0.375rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 1rem;
        }

        .back-link {
            font-size: 1.25rem;
            font-weight: bold;
            color: #212529;
            text-decoration: none;
        }

        .date-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .date-selector select,
        .date-selector span {
            border: none;
            background: none;
            font-size: 1.25rem;
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .date-selector select {
            background-color: #f8f9fa;
            border-radius: 0.25rem;
            padding-right: 1.5rem;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 16px 12px;
            cursor: pointer;
        }

        /* メインコンテンツ */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        .submit-button-container {
            text-align: right;
            margin-bottom: 1rem;
        }

        .submit-button {
            padding: 0.75rem 2rem;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submit-button:hover {
            background: #357abd;
        }

        /* シフト表 */
        .shift-table-container {
            background-color: #ffffff;
            border-radius: 0.375rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            padding: 1.5rem;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            overflow: hidden;
        }

        .calendar-day-header {
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .calendar-day-header:nth-child(7n) {
            border-right: none;
        }

        .calendar-day-header.sunday {
            color: #d32f2f;
        }

        .calendar-day-header.saturday {
            color: #1976d2;
        }

        .calendar-day {
            border-right: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
            min-height: 100px;
            padding: 12px;
            background-color: white;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .calendar-day:nth-child(7n) {
            border-right: none;
        }

        .calendar-day:hover {
            background-color: #e3f2fd;
        }

        .calendar-day.empty {
            background-color: #f8f9fa;
            cursor: default;
        }

        .calendar-day.empty:hover {
            background-color: #f8f9fa;
        }

        .day-number {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .calendar-day.sunday .day-number {
            color: #d32f2f;
        }

        .calendar-day.saturday .day-number {
            color: #1976d2;
        }

        .shift-info {
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            padding: 6px 8px;
            text-align: center;
            line-height: 1.4;
            border-radius: 4px;
        }

        .shift-info.shift-a {
            background-color: #fff3e0;
            color: #e65100;
        }

        .shift-info.shift-b {
            background-color: #e3f2fd;
            color: #0d47a1;
        }

        .shift-info.shift-c {
            background-color: #f3e5f5;
            color: #4a148c;
        }

        .shift-info.shift-el {
            background-color: #e8f5e9;
            color: #1b5e20;
        }

        .shift-info.shift-n {
            background-color: #fce4ec;
            color: #880e4f;
        }

        .shift-info.shift-l {
            background-color: #fff9c4;
            color: #f57f17;
        }

        .shift-info.shift-sp {
            background-color: #e0f2f1;
            color: #004d40;
        }

        /* ホーム別の背景色（視認性重視） */
        .calendar-day.home-a {
            background-color: #FFD5D5; /* 薄い赤/ピンク */
        }

        .calendar-day.home-b {
            background-color: #D5E8FF; /* 薄い青 */
        }

        .calendar-day.home-c {
            background-color: #D5FFD5; /* 薄い緑 */
        }

        .calendar-day.home-d {
            background-color: #FFEBD5; /* 薄いオレンジ */
        }

        .calendar-day.home-e {
            background-color: #EBD5FF; /* 薄い紫 */
        }

        .calendar-day.home-f {
            background-color: #FFD5EB; /* 薄いマゼンタ */
        }

        .calendar-day.home-g {
            background-color: #D5FFFF; /* 薄いシアン */
        }

        .calendar-day.home-h {
            background-color: #FFFFD5; /* 薄い黄色 */
        }

        .calendar-day.home-i {
            background-color: #FFE0CC; /* 薄いコーラル */
        }

        .calendar-day.home-j {
            background-color: #E0D5FF; /* 薄いラベンダー */
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #ffffff;
            margin: auto;
            border-radius: 0.375rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #dee2e6;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .modal-close {
            font-size: 1.75rem;
            font-weight: bold;
            color: #6c757d;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #212529;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-body .form-group {
            margin-bottom: 1rem;
        }

        .modal-body label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .modal-body .form-value {
            padding: 0.5rem;
            background-color: #f8f9fa;
            border-radius: 0.25rem;
            font-size: 0.9rem;
        }

        .modal-body .form-control {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #dee2e6;
            border-radius: 0.25rem;
            font-size: 0.9rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid #dee2e6;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: bold;
            text-align: center;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .btn-save {
            background-color: #007bff;
            color: white;
        }

        .btn-save:hover {
            background-color: #0056b3;
        }

        /* レスポンシブ対応 */
        @media screen and (max-width: 768px) {
            .app-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .calendar-day {
                min-height: 80px;
                padding: 8px;
            }

            .day-number {
                font-size: 14px;
            }

            .shift-info {
                font-size: 11px;
                padding: 4px 6px;
            }

            .calendar-day-header {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- モーダル -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>シフト希望入力</h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>日付</label>
                    <div id="modal-date" class="form-value"></div>
                </div>
                <div class="form-group">
                    <label>シフトコード</label>
                    <select id="modal-shift-code" class="form-control">
                        <option value="NONE">未定</option>
                        <option value="A">A（日勤：10時～19時）</option>
                        <option value="B">B（夜勤：22時～7時）</option>
                        <option value="C">C（遅番：13時～22時）</option>
                        <option value="EL">EL（早朝：7時～10時）</option>
                        <option value="N">N（公休）</option>
                        <option value="L">L（有休）</option>
                        <option value="SP">SP（特休）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ホーム</label>
                    <select id="modal-home" class="form-control">
                        <option value="">指定なし</option>
                        <!-- ホーム選択肢は動的に生成されます -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="modal-cancel-btn">キャンセル</button>
                <button class="btn btn-save" id="modal-save-btn">保存</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <!-- ヘッダー -->
        <header class="app-header">
            <a href="shift_home_staff.html" class="back-link">← 戻る</a>
            <div class="date-selector">
                <select id="year-select">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
                <span>年</span>
                <select id="month-select">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
                <span>月</span>
            </div>
            <div style="width: 60px;"></div>
        </header>

        <!-- 提出ボタン -->
        <div class="submit-button-container">
            <button class="submit-button" onclick="submitShift()">シフト希望を提出</button>
        </div>

        <!-- シフト表 -->
        <div class="shift-table-container">
            <div class="calendar" id="calendar">
                <!-- カレンダーはJavaScriptで生成 -->
            </div>
        </div>
    </div>

    <script>
        // シフト提出画面専用のアプリケーションステート
        const submissionAppState = {
            currentYear: 2025,
            currentMonth: 11,
            myShifts: {},
            editingDate: null,
            isSubmitted: false  // 提出済みフラグ
        };

        // SHIFT_CODESはscript.jsから読み込まれます

        let submissionDom = {};
        let submissionInitialized = false; // 初期化フラグ

        document.addEventListener('DOMContentLoaded', () => {
            // script.jsの初期化を待つ
            if (submissionInitialized) return;
            submissionInitialized = true;
            
            submissionDom = {
                yearSelect: document.getElementById('year-select'),
                monthSelect: document.getElementById('month-select'),
                calendar: document.getElementById('calendar'),
                modal: document.getElementById('edit-modal'),
                modalCloseBtn: document.querySelector('.modal-close'),
                modalCancelBtn: document.getElementById('modal-cancel-btn'),
                modalSaveBtn: document.getElementById('modal-save-btn'),
                modalDate: document.getElementById('modal-date'),
                modalShiftCode: document.getElementById('modal-shift-code'),
                modalHome: document.getElementById('modal-home'),
            };

            // 初期表示を翌月に設定
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            submissionAppState.currentYear = nextMonth.getFullYear();
            submissionAppState.currentMonth = nextMonth.getMonth() + 1;

            // 選択肢を今月と来月のみに制限
            populateMonthYearSelectors();

            setupEventListeners();
            submissionRender(); // script.jsのrender()と区別

            submissionDom.yearSelect.value = submissionAppState.currentYear;
            submissionDom.monthSelect.value = submissionAppState.currentMonth;
            
            // 提出済みデータを確認（過去の月でも表示）
            checkSubmittedData();
        });

        function populateMonthYearSelectors() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1; // 1-12
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            const nextYear = nextMonth.getFullYear();
            const nextMonthNum = nextMonth.getMonth() + 1;

            // 年選択肢をクリア
            submissionDom.yearSelect.innerHTML = '';
            const years = new Set([currentYear, nextYear]);
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                submissionDom.yearSelect.appendChild(option);
            });

            // 月選択肢をクリア
            submissionDom.monthSelect.innerHTML = '';
            
            // 今月
            const currentOption = document.createElement('option');
            currentOption.value = currentMonth;
            currentOption.textContent = currentMonth;
            submissionDom.monthSelect.appendChild(currentOption);
            
            // 来月
            const nextOption = document.createElement('option');
            nextOption.value = nextMonthNum;
            nextOption.textContent = nextMonthNum;
            submissionDom.monthSelect.appendChild(nextOption);
        }

        async function checkSubmittedData() {
            console.log('🔄 checkSubmittedData() 開始');
            
            try {
                const token = localStorage.getItem('shift_auth_token');
                if (!token) {
                    console.warn('⚠️ トークンがありません');
                    return;
                }

                // 自分のuser_idを取得
                const user = AUTH ? AUTH.getUser() : null;
                if (!user) {
                    console.warn('⚠️ ユーザー情報がありません');
                    return;
                }

                const myUserId = user.id || user.username || user.user_id;
                console.log('👤 現在のユーザー:', user, 'user_id:', myUserId);
                
                // 現在の年月
                const now = new Date();
                const selectedDate = new Date(submissionAppState.currentYear, submissionAppState.currentMonth - 1, 1);
                const currentMonthDate = new Date(now.getFullYear(), now.getMonth(), 1);
                const isPastMonth = selectedDate < currentMonthDate;

                // APIから提出済みデータを取得
                console.log(`🔍 データ取得開始: ${API_BASE_URL}/api/shift-requests/get?year=${submissionAppState.currentYear}&month=${submissionAppState.currentMonth}`);
                
                const response = await fetch(
                    `${API_BASE_URL}/api/shift-requests/get?year=${submissionAppState.currentYear}&month=${submissionAppState.currentMonth}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                console.log(`📡 レスポンス: status=${response.status}, ok=${response.ok}`);

                if (!response.ok) {
                    console.error(`❌ データ取得失敗: ${response.status} ${response.statusText}`);
                    try {
                        const errorData = await response.json();
                        console.error('エラー詳細:', errorData);
                    } catch (e) {
                        const errorText = await response.text();
                        console.error('エラーテキスト:', errorText);
                    }
                    
                    // データがない場合、過去の月なら編集不可
                    if (isPastMonth) {
                        submissionAppState.isSubmitted = true;
                    }
                    // レンダリングとボタン状態を更新
                    submissionRender();
                    updateSubmitButtonState();
                    return;
                }

                const data = await response.json();
                console.log('📦 取得データ:', data);
                
                if (!data.success || !data.shifts) {
                    console.warn('⚠️ データなし、または不正なレスポンス');
                    // データがない場合、過去の月なら編集不可
                    if (isPastMonth) {
                        submissionAppState.isSubmitted = true;
                    }
                    // レンダリングとボタン状態を更新
                    submissionRender();
                    updateSubmitButtonState();
                    return;
                }

                // 自分の提出済みシフトを抽出
                let hasSubmitted = false;
                submissionAppState.myShifts = {}; // 既存データをクリア
                
                console.log('🔍 APIレスポンス全体:', data);
                
                Object.entries(data.shifts).forEach(([dateStr, homes]) => {
                    const [y, m, day] = dateStr.split('-').map(Number);
                    
                    Object.entries(homes).forEach(([home, shiftCodes]) => {
                        Object.entries(shiftCodes).forEach(([shiftCode, users]) => {
                            users.forEach(userShift => {
                                console.log(`  日付${day}: user_id=${userShift.user_id}, status=${userShift.status}, 自分=${myUserId}`);
                                
                                // 自分のデータのみ抽出（statusに関わらず全て取得）
                                if (userShift.user_id === myUserId) {
                                    hasSubmitted = true;
                                    submissionAppState.myShifts[day] = {
                                        code: shiftCode,
                                        home: home === '未定' ? '' : home,
                                        status: userShift.status // statusも保存
                                    };
                                }
                            });
                        });
                    });
                });
                
                console.log('📊 提出済みシフト取得:', {
                    年月: `${submissionAppState.currentYear}年${submissionAppState.currentMonth}月`,
                    提出済み: hasSubmitted,
                    シフト日数: Object.keys(submissionAppState.myShifts).length,
                    データ: submissionAppState.myShifts
                });

                if (hasSubmitted) {
                    // 提出済みの場合は編集不可
                    submissionAppState.isSubmitted = true;
                    
                    // 今月または来月の場合のみメッセージを表示
                    const shiftCount = Object.keys(submissionAppState.myShifts).length;
                    if (!isPastMonth) {
                        console.log(`✅ この月のシフト希望は既に提出済みです（${shiftCount}日分）`);
                    }
                } else {
                    // 提出データがない場合
                    if (isPastMonth) {
                        // 過去の月で未提出の場合は編集不可（閲覧のみ）
                        submissionAppState.isSubmitted = true;
                    } else {
                        // 今月または来月で未提出の場合は編集可能
                        submissionAppState.isSubmitted = false;
                    }
                }
                
                // データ取得後にレンダリングとボタン状態を更新
                submissionRender();
                updateSubmitButtonState();

            } catch (error) {
                console.error('❌❌❌ 提出済みデータ確認エラー:', error);
                console.error('スタックトレース:', error.stack);
                
                // エラーが発生した場合、過去の月なら編集不可
                const now = new Date();
                const selectedDate = new Date(submissionAppState.currentYear, submissionAppState.currentMonth - 1, 1);
                const currentMonthDate = new Date(now.getFullYear(), now.getMonth(), 1);
                
                if (selectedDate < currentMonthDate) {
                    submissionAppState.isSubmitted = true;
                    updateSubmitButtonState();
                }
            }
        }

        function setupEventListeners() {
            submissionDom.yearSelect.addEventListener('change', handleDateChange);
            submissionDom.monthSelect.addEventListener('change', handleDateChange);
            submissionDom.calendar.addEventListener('click', handleCellClick);
            submissionDom.modalCloseBtn.addEventListener('click', closeModal);
            submissionDom.modalCancelBtn.addEventListener('click', closeModal);
            submissionDom.modalSaveBtn.addEventListener('click', handleModalSave);
        }

        async function handleDateChange() {
            // 選択された月に応じて年を自動調整
            const selectedMonth = parseInt(submissionDom.monthSelect.value, 10);
            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            
            // 選択された月が今月より小さい場合は来年
            if (selectedMonth < currentMonth) {
                submissionAppState.currentYear = now.getFullYear() + 1;
            } else {
                submissionAppState.currentYear = now.getFullYear();
            }
            
            submissionAppState.currentMonth = selectedMonth;
            submissionAppState.myShifts = {}; // データをクリア
            submissionAppState.isSubmitted = false;
            
            console.log(`📅 月切り替え: ${submissionAppState.currentYear}年${submissionAppState.currentMonth}月`);
            
            // 年選択肢を更新
            submissionDom.yearSelect.value = submissionAppState.currentYear;
            
            // データベースから提出済みデータをチェック（非同期）
            // checkSubmittedData内でrender()とupdateSubmitButtonState()が呼ばれる
            await checkSubmittedData();
        }

        function updateSubmitButtonState() {
            const submitBtn = document.querySelector('.submit-button');
            if (submitBtn) {
                // 過去の月かチェック
                const now = new Date();
                const selectedDate = new Date(submissionAppState.currentYear, submissionAppState.currentMonth - 1, 1);
                const currentMonthDate = new Date(now.getFullYear(), now.getMonth(), 1);
                const isPastMonth = selectedDate < currentMonthDate;
                const shiftCount = Object.keys(submissionAppState.myShifts).length;
                
                if (submissionAppState.isSubmitted || isPastMonth) {
                    submitBtn.disabled = true;
                    submitBtn.style.opacity = '0.5';
                    submitBtn.style.cursor = 'not-allowed';
                    
                    if (shiftCount > 0) {
                        submitBtn.textContent = `✓ 提出済み（${shiftCount}日分）`;
                    } else if (isPastMonth) {
                        submitBtn.textContent = '過去の月（閲覧のみ）';
                    } else {
                        submitBtn.textContent = '提出済み';
                    }
                } else {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.style.cursor = 'pointer';
                    
                    if (shiftCount > 0) {
                        submitBtn.textContent = `シフト希望を提出（${shiftCount}日分入力済み）`;
                    } else {
                        submitBtn.textContent = 'シフト希望を提出';
                    }
                }
            }
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month - 1, 1).getDay(); // 0=日曜, 6=土曜
        }

        function getDayOfWeek(year, month, day) {
            return new Date(year, month - 1, day).getDay();
        }

        function submissionRender() {
            const daysInMonth = getDaysInMonth(submissionAppState.currentYear, submissionAppState.currentMonth);
            const firstDay = getFirstDayOfMonth(submissionAppState.currentYear, submissionAppState.currentMonth);
            
            let calendarHtml = '';
            
            // 曜日ヘッダー
            const dayHeaders = ['日', '月', '火', '水', '木', '金', '土'];
            dayHeaders.forEach((day, index) => {
                const className = index === 0 ? 'sunday' : (index === 6 ? 'saturday' : '');
                calendarHtml += `<div class="calendar-day-header ${className}">${day}</div>`;
            });
            
            // 月初めまでの空セル
            for (let i = 0; i < firstDay; i++) {
                calendarHtml += '<div class="calendar-day empty"></div>';
            }
            
            // 日付セル
            for (let day = 1; day <= daysInMonth; day++) {
                const dayOfWeek = getDayOfWeek(submissionAppState.currentYear, submissionAppState.currentMonth, day);
                const shift = submissionAppState.myShifts[day] || { code: 'NONE', home: '' };
                const shiftInfo = SHIFT_CODES[shift.code] || SHIFT_CODES['NONE'];
                
                let dayClass = 'calendar-day';
                if (dayOfWeek === 0) dayClass += ' sunday';
                if (dayOfWeek === 6) dayClass += ' saturday';
                if (shift.home) dayClass += ` home-${shift.home.toLowerCase()}`;
                
                calendarHtml += `<div class="${dayClass}" data-date="${day}">`;
                calendarHtml += `<div class="day-number">${day}</div>`;
                
                if (shift.code !== 'NONE') {
                    calendarHtml += `<div class="shift-info ${shiftInfo.class}">${shift.code}</div>`;
                }
                
                calendarHtml += '</div>';
            }
            
            submissionDom.calendar.innerHTML = calendarHtml;
        }

        function handleCellClick(event) {
            // 提出済みの場合は編集不可
            if (submissionAppState.isSubmitted) {
                // 過去の月かチェック
                const now = new Date();
                const selectedDate = new Date(submissionAppState.currentYear, submissionAppState.currentMonth - 1, 1);
                const currentMonthDate = new Date(now.getFullYear(), now.getMonth(), 1);
                const isPastMonth = selectedDate < currentMonthDate;
                
                if (isPastMonth) {
                    alert('過去の月は編集できません（閲覧のみ）');
                } else {
                    alert('提出済みのため編集できません');
                }
                return;
            }
            
            const cell = event.target.closest('.calendar-day');
            if (!cell || cell.classList.contains('empty')) return;
            
            const date = cell.dataset.date;
            if (!date) return;

            submissionAppState.editingDate = date;
            const currentShift = submissionAppState.myShifts[date] || { code: 'NONE', home: '' };
            
            openModal(date, currentShift);
        }

        function openModal(date, currentShift) {
            submissionDom.modalDate.textContent = `${submissionAppState.currentYear}年${submissionAppState.currentMonth}月${date}日`;
            submissionDom.modalShiftCode.value = currentShift.code;
            submissionDom.modalHome.value = currentShift.home || '';
            
            submissionDom.modal.classList.add('show');
        }

        function closeModal() {
            submissionDom.modal.classList.remove('show');
            submissionAppState.editingDate = null;
        }

        function handleModalSave() {
            if (!submissionAppState.editingDate) return;
            
            const newCode = submissionDom.modalShiftCode.value;
            const newHome = submissionDom.modalHome.value;

            submissionAppState.myShifts[submissionAppState.editingDate] = { code: newCode, home: newHome };
            
            closeModal();
            submissionRender();
            updateSubmitButtonState(); // ボタン表示を更新
        }

        async function submitShift() {
            // 提出済みチェック
            if (submissionAppState.isSubmitted) {
                alert('既に提出済みです');
                return;
            }
            
            const shiftCount = Object.keys(submissionAppState.myShifts).length;
            if (shiftCount === 0) {
                alert('シフト希望が入力されていません。');
                return;
            }

            if (confirm(`${submissionAppState.currentYear}年${submissionAppState.currentMonth}月のシフト希望を提出しますか？\n入力済み: ${shiftCount}日分`)) {
                try {
                    const token = localStorage.getItem('shift_auth_token');
                    if (!token) {
                        alert('ログインが必要です');
                        window.location.href = window.BASE_PATH || '/shift/';
                        return;
                    }

                    console.log('📤 提出データ:', submissionAppState.myShifts);

                    const response = await fetch(`${API_BASE_URL}/api/shift-requests/submit`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            year: submissionAppState.currentYear,
                            month: submissionAppState.currentMonth,
                            shifts: submissionAppState.myShifts
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'シフト希望の提出に失敗しました');
                    }

                    console.log('✅ 提出成功:', data);
                    alert(`シフト希望を提出しました！\n保存件数: ${data.saved_count}件`);
                    
                    // 提出後は編集不可に
                    submissionAppState.isSubmitted = true;
                    updateSubmitButtonState();
                } catch (error) {
                    console.error('❌ 提出エラー:', error);
                    alert('シフト希望の提出に失敗しました: ' + error.message);
                }
            }
        }
    </script>
    
    <!-- API設定を先に読み込む -->
    <script src="config.js"></script>
    <!-- 認証スクリプト -->
    <script src="auth.js"></script>
    
    <script>
        // script.jsから必要な関数のみを読み込むための準備
        // SHIFT_CODESの定義をここに追加
        if (typeof SHIFT_CODES === 'undefined') {
            window.SHIFT_CODES = {
                A: { name: '日勤', time: '10時～19時', class: 'shift-a' },
                B: { name: '夜勤', time: '22時～7時', class: 'shift-b' },
                C: { name: '遅番', time: '13時～22時', class: 'shift-c' },
                EL: { name: '早朝', time: '7時～10時', class: 'shift-el' },
                N: { name: '公休', time: '', class: 'shift-n' },
                L: { name: '有休', time: '', class: 'shift-l' },
                SP: { name: '特休', time: '', class: 'shift-sp' },
                NONE: { name: '未定', time: '', class: 'shift-none' }
            };
        }
        
        // loadHomesListとpopulateHomeSelectをインポート
        async function loadHomesList() {
            const CACHE_KEY = 'shift_homes_cache';
            const CACHE_TIMESTAMP_KEY = 'shift_homes_cache_timestamp';
            const CACHE_DURATION = 5 * 60 * 1000;
            
            const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);
            if (timestamp) {
                const age = Date.now() - parseInt(timestamp);
                if (age < CACHE_DURATION) {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (cached) {
                        try {
                            return JSON.parse(cached);
                        } catch (e) {
                            console.error('キャッシュ解析エラー:', e);
                        }
                    }
                }
            }
            
            try {
                const token = localStorage.getItem('shift_auth_token');
                if (!token) return ['A', 'B', 'C', 'D', 'E'];
                
                const response = await fetch(`${API_BASE_URL}/api/homes`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('ホーム取得失敗');
                
                const data = await response.json();
                
                if (data.success && data.homes && data.homes.length > 0) {
                    const homes = data.homes.map(h => h.name);
                    localStorage.setItem(CACHE_KEY, JSON.stringify(homes));
                    localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now().toString());
                    return homes;
                }
                return ['A', 'B', 'C', 'D', 'E'];
            } catch (error) {
                console.error('❌ ホーム取得エラー:', error);
                return ['A', 'B', 'C', 'D', 'E'];
            }
        }
        
        async function populateHomeSelect(selectElement, options = {}) {
            if (!selectElement) return;
            
            const { includeUndecided = false } = options;
            const homes = await loadHomesList();
            
            selectElement.innerHTML = '';
            
            homes.forEach((home) => {
                if (home === '未定' && !includeUndecided) return;
                const option = document.createElement('option');
                option.value = home;
                option.textContent = `${home}ホーム`;
                selectElement.appendChild(option);
            });
        }
    </script>
    
    <script>
        // ページ読み込み時の認証チェック
        document.addEventListener('DOMContentLoaded', async () => {
            // ホーム選択肢を動的生成
            const modalHome = document.getElementById('modal-home');
            if (modalHome && typeof populateHomeSelect === 'function') {
                await populateHomeSelect(modalHome, { includeUndecided: false });
                
                // "指定なし"オプションを先頭に追加（既存のものを削除して再作成）
                const existingEmpty = modalHome.querySelector('option[value=""]');
                if (existingEmpty) {
                    existingEmpty.remove();
                }
                
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '指定なし';
                modalHome.insertBefore(emptyOption, modalHome.firstChild);
            }
            
            // 認証チェック
            if (typeof PageRouter !== 'undefined') {
                const hasAccess = await PageRouter.checkPageAccess();
                if (!hasAccess) {
                    return; // 認証失敗時は処理を中断
                }
            }
            
            // ユーザー情報を表示
            const user = AUTH ? AUTH.getUser() : null;
            if (user) {
                console.log('👤 ログインユーザー:', user.name, `(${user.role})`);
            }
            
            // 戻るボタンの実装
            const backLink = document.querySelector('.back-link');
            if (backLink) {
                backLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // ユーザー情報を取得
                    const user = AUTH ? AUTH.getUser() : null;
                    
                    if (user) {
                        // ロールに応じてホーム画面へ遷移
                        if (user.role === 'admin') {
                            window.location.href = 'shift_home_admin.html';
                        } else {
                            window.location.href = 'shift_home_staff.html';
                        }
                    } else {
                        // ログインしていない場合はブラウザバック
                        window.history.back();
                    }
                });
            }
        });
    </script>
