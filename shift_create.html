<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト表管理システム</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* シフト表のスクロール対応 */
        .shift-table-container {
            max-height: calc(10 * 50px + 60px); /* 10人分の高さ + ヘッダー */
            overflow-y: auto;
            overflow-x: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }
        
        .shift-table {
            width: auto;
            min-width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        /* スタッフ名列を固定 */
        .shift-table thead th:first-child,
        .shift-table tbody td:first-child {
            position: sticky;
            left: 0;
            background: white;
            z-index: 10;
            border-right: 2px solid #ddd;
        }
        
        .shift-table thead th:first-child {
            z-index: 20;
            background: #f8f9fa;
        }
        
        /* テーブル行の高さ固定 */
        .shift-table tbody tr {
            height: 50px;
        }
        
        .shift-table tbody td {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #e0e0e0;
            padding: 4px;
        }
        
        .shift-table tbody td:first-child {
            min-width: 150px;
            max-width: 150px;
            width: 150px;
            text-align: left;
            padding-left: 12px;
            font-weight: 500;
        }
        
        .shift-table thead th {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            text-align: center;
            padding: 12px 4px;
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        
        .shift-table thead th:first-child {
            min-width: 150px;
            max-width: 150px;
            width: 150px;
            text-align: left;
            padding-left: 12px;
        }
        
        /* スクロールバーのスタイル */
        .shift-table-container::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        .shift-table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 6px;
        }
        
        .shift-table-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 6px;
        }
        
        .shift-table-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>シフト編集</h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>スタッフ名</label>
                    <div id="modal-staff-name" class="form-value"></div>
                </div>
                <div class="form-group">
                    <label>日付</label>
                    <div id="modal-date" class="form-value"></div>
                </div>
                <div class="form-group">
                    <label>シフトコード</label>
                    <select id="modal-shift-code" class="form-control">
                        <!-- シフトコードは動的に読み込まれます -->
                        <option value="NONE">未定</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ホーム</label>
                    <select id="modal-home" class="form-control">
                        <!-- ホーム選択肢は動的に生成されます -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="modal-cancel-btn">キャンセル</button>
                <button class="btn btn-save" id="modal-save-btn">保存</button>
            </div>
        </div>
    </div>

    <div class="app-container">

        <nav class="sidebar-left">
            <div class="form-group">
                <label for="home-select">表示ホーム</label>
                <select id="home-select">
                    <!-- ホーム選択肢は動的に生成されます -->
                </select>
            </div>

            <h3>シフト要望</h3>
            <ul class="shift-request-list" id="shift-request-list">
            </ul>
            <button class="btn btn-reflect-all" id="reflect-all-btn" onclick="bulkApproveShiftRequests()">すべて一括承認</button>
        </nav>

        <div class="main-wrapper">
            <header class="app-header">
                <a href="#" class="back-link">← 戻る</a>
                <div class="date-selector">
                    <select id="year-select">
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                    <span>年</span>
                    <select id="month-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                    <span>月</span>
                </div>
                <button id="export-sheet-btn" onclick="exportToSpreadsheet()" style="
                    background: #1a73e8;
                    color: white;
                    border: none;
                    border-radius: 6px;
                    padding: 8px 16px;
                    font-size: 14px;
                    font-weight: bold;
                    cursor: pointer;
                    white-space: nowrap;
                ">📊 スプレッドシートへ出力</button>
            </header>

            <main class="main-content">
                <div class="shift-table-container">
                    <table class="shift-table" id="shift-table">
                        <thead id="shift-table-header">
                            </thead>
                        <tbody id="shift-table-body">
                            </tbody>
                    </table>
                </div>

                <h3 class="daily-summary-title">ホーム別日次集計</h3>
                <div class="summary-table-container">
                    <div class="daily-summary-header">
                        <label for="daily-summary-home-select">集計対象：</label>
                        <select id="daily-summary-home-select">
                            <!-- ホーム選択肢は動的に生成されます -->
                        </select>
                    </div>
                    <table class="summary-table" id="daily-summary-table">
                        <tbody id="daily-summary-body">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>

        <aside class="sidebar-right">
            <div class="summary-card">
                <div class="summary-card-header">
                    月間集計
                </div>
                <div class="summary-card-body">
                    <ul class="summary-list-group" id="monthly-summary">
                        </ul>
                </div>
            </div>

            <div class="summary-card">
                <div class="summary-card-header">
                    ホーム別月間合計
                </div>
                <div class="summary-card-body">
                    <ul class="summary-list-group home-summary-list" id="home-summary">
                        </ul>
                </div>
            </div>
        </aside>

    </div>

    <!-- API設定を先に読み込む -->
    <script src="config.js"></script>
    <!-- 認証スクリプト -->
    <script src="auth.js"></script>
    <!-- メインスクリプト -->
    <script src="script.js"></script>
    
    <script>
        // ページ読み込み時の認証チェック
        document.addEventListener('DOMContentLoaded', async () => {
            // ホーム選択肢を動的生成
            await populateHomeSelect(document.getElementById('home-select'), { includeAll: true });
            await populateHomeSelect(document.getElementById('modal-home'), { includeUndecided: true });
            await populateHomeSelect(document.getElementById('daily-summary-home-select'), { defaultValue: 'A' });
            
            // シフトコード選択肢を動的生成
            await populateShiftCodeSelect(document.getElementById('modal-shift-code'));

            // 認証チェック
            if (typeof PageRouter !== 'undefined') {
                const hasAccess = await PageRouter.checkPageAccess();
                if (!hasAccess) {
                    return; // 認証失敗時は処理を中断
                }
            }
            
            // ユーザー情報を表示
            const user = AUTH ? AUTH.getUser() : null;
            if (user) {
                console.log('👤 ログインユーザー:', user.name, `(${user.role})`);
            }
        });
        
        // 戻るボタンの動作を設定
        document.querySelector('.back-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.history.back();
        });

        /**
         * シフトコード選択肢を動的生成（APIから取得）
         */
        async function populateShiftCodeSelect(selectElement) {
            if (!selectElement) return;
            try {
                const token = localStorage.getItem('shift_auth_token');
                if (!token) return;

                const response = await fetch(`${API_BASE_URL}/api/shift-codes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('シフトコード取得失敗');
                const data = await response.json();

                if (data.success && data.codes && data.codes.length > 0) {
                    selectElement.innerHTML = '<option value="NONE">未定</option>';
                    data.codes.forEach(code => {
                        if (!code.active) return;
                        const option = document.createElement('option');
                        option.value = code.code;
                        // ラベルと時間帯を表示（例: A（日勤：10時～19時））
                        const hoursText = code.hours > 0 ? `  ${code.hours}h` : '';
                        option.textContent = `${code.code}（${code.label}${hoursText}）`;
                        selectElement.appendChild(option);
                    });
                    console.log('✅ シフトコード選択肢を動的生成:', data.codes.length + '件');
                } else {
                    // APIからデータがない場合はフォールバック（デフォルト値）
                    selectElement.innerHTML = `
                        <option value="NONE">未定</option>
                        <option value="A">A（日勤）</option>
                        <option value="B">B（夜勤）</option>
                        <option value="C">C（遅番）</option>
                        <option value="EL">EL（早朝）</option>
                        <option value="N">N（公休）</option>
                        <option value="L">L（有休）</option>
                        <option value="SP">SP（特休）</option>
                    `;
                }
            } catch (error) {
                console.warn('⚠️ シフトコード取得エラー（デフォルトを使用）:', error);
                selectElement.innerHTML = `
                    <option value="NONE">未定</option>
                    <option value="A">A（日勤）</option>
                    <option value="B">B（夜勤）</option>
                    <option value="C">C（遅番）</option>
                    <option value="EL">EL（早朝）</option>
                    <option value="N">N（公休）</option>
                    <option value="L">L（有休）</option>
                    <option value="SP">SP（特休）</option>
                `;
            }
        }

        /**
         * スプレッドシートへ出力（シート2：全員一覧）
         */
        async function exportToSpreadsheet() {
            const btn = document.getElementById('export-sheet-btn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ 出力中...';
            btn.disabled = true;

            try {
                const token = localStorage.getItem('shift_auth_token');
                if (!token) {
                    alert('ログインが必要です');
                    return;
                }

                const year = appState.currentYear;
                const month = appState.currentMonth;

                if (!appState.staff || appState.staff.length === 0) {
                    alert('スタッフデータが読み込まれていません。\nページを再読み込みしてください。');
                    return;
                }

                if (!confirm(`${year}年${month}月のシフト表をスプレッドシート（出勤簿）に出力しますか？\nシート名: ${year}-${String(month).padStart(2, '0')}`)) {
                    return;
                }

                console.log(`📊 スプレッドシート出力開始: ${year}年${month}月`);

                const response = await fetch(`${API_BASE_URL}/api/shifts/export-to-sheet2`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        year: year,
                        month: month,
                        staff: appState.staff,
                        shifts: appState.shifts
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert(`✅ 出力完了！\n${year}年${month}月のシフト表を「${data.sheet_name}」に書き込みました。\n（スタッフ数: ${data.staff_count}名）`);
                    console.log('✅ スプレッドシート出力成功:', data);
                } else {
                    alert(`❌ 出力に失敗しました。\n${data.error}`);
                    console.error('❌ 出力失敗:', data);
                }
            } catch (error) {
                console.error('❌ 出力エラー:', error);
                alert('出力中にエラーが発生しました: ' + error.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
