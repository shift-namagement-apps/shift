<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト表管理システム</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* シフト表のスクロール対応 */
        .shift-table-container {
            max-height: calc(10 * 50px + 60px); /* 10人分の高さ + ヘッダー */
            overflow-y: auto;
            overflow-x: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }
        
        .shift-table {
            width: auto;
            min-width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        /* スタッフ名列を固定 */
        .shift-table thead th:first-child,
        .shift-table tbody td:first-child {
            position: sticky;
            left: 0;
            background: white;
            z-index: 10;
            border-right: 2px solid #ddd;
        }
        
        .shift-table thead th:first-child {
            z-index: 20;
            background: #f8f9fa;
        }
        
        /* テーブル行の高さ固定 */
        .shift-table tbody tr {
            height: 50px;
        }
        
        .shift-table tbody td {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #e0e0e0;
            padding: 4px;
            box-sizing: border-box;
        }
        
        .shift-table tbody td:first-child {
            min-width: 150px;
            max-width: 150px;
            width: 150px;
            text-align: left;
            padding-left: 12px;
            font-weight: 500;
            box-sizing: border-box;
        }
        
        .shift-table thead th {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            text-align: center;
            padding: 8px 4px;
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 15;
            box-sizing: border-box;
        }
        
        .shift-table thead th:first-child {
            min-width: 150px;
            max-width: 150px;
            width: 150px;
            text-align: left;
            padding-left: 12px;
            box-sizing: border-box;
        }
        
        /* 月合計列 - シフト表 */
        .shift-table thead th:last-child,
        .shift-table tbody td:last-child {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            box-sizing: border-box;
        }
        
        /* スクロールバーのスタイル */
        .shift-table-container::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        .shift-table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 6px;
        }
        
        .shift-table-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 6px;
        }
        
        .shift-table-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* 日次集計のスタイル */
        .daily-summary-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .daily-summary-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .daily-summary-home-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .daily-summary-home-selector label {
            font-size: 14px;
            font-weight: 500;
            margin: 0;
        }
        
        .daily-summary-home-selector select {
            padding: 5px 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
        }
        
        .summary-table-container {
            overflow-x: auto;
            overflow-y: hidden;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }
        
        .summary-table {
            width: auto;
            min-width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        /* 日次集計のヘッダー（日付） */
        .summary-table thead th {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            text-align: center;
            padding: 8px 4px;
            background: #e8e8e8;
            border: 1px solid #e0e0e0;
            font-weight: 600;
            font-size: 12px;
            position: sticky;
            top: 0;
            box-sizing: border-box;
        }
        
        .summary-table thead th:first-child {
            min-width: 150px;
            max-width: 150px;
            width: 150px;
            text-align: left;
            padding-left: 12px;
            position: sticky;
            left: 0;
            z-index: 10;
            background: #e8e8e8;
            border-right: 2px solid #ddd;
            box-sizing: border-box;
        }
        
        /* 日次集計のボディ（データ行） */
        .summary-table tbody td {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            text-align: center;
            vertical-align: top;
            border: 1px solid #e0e0e0;
            padding: 4px;
            background: #f9f9f9;
            box-sizing: border-box;
        }
        
        .summary-table tbody td:first-child {
            min-width: 150px;
            max-width: 150px;
            width: 150px;
            text-align: left;
            padding-left: 12px;
            font-weight: 600;
            position: sticky;
            left: 0;
            background: #f0f0f0;
            z-index: 5;
            border-right: 2px solid #ddd;
            box-sizing: border-box;
        }
        
        /* 月合計列 - シフト表と同じ幅 */
        .summary-table thead th:last-child,
        .summary-table tbody td:last-child {
            min-width: 80px;
            max-width: 80px;
            width: 80px;
            font-weight: bold;
            background: #e8e8e8;
            box-sizing: border-box;
        }
        
        .summary-table tbody td:last-child {
            background: #f5f5f5;
        }
        
        .summary-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 11px;
            line-height: 1.4;
        }
        
        .summary-list li {
            white-space: nowrap;
        }
        
        /* スクロールバーのスタイル（日次集計） */
        .summary-table-container::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        .summary-table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 6px;
        }
        
        .summary-table-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 6px;
        }
        
        .summary-table-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* 書き込みボタンのスタイル */
        .btn-export {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-export:hover {
            background-color: #218838;
        }
        
        .btn-export:active {
            background-color: #1e7e34;
        }
        
        .btn-export:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>シフト編集</h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>スタッフ名</label>
                    <div id="modal-staff-name" class="form-value"></div>
                </div>
                <div class="form-group">
                    <label>日付</label>
                    <div id="modal-date" class="form-value"></div>
                </div>
                <div class="form-group">
                    <label>シフトコード</label>
                    <select id="modal-shift-code" class="form-control">
                        <!-- シフトコードはDBから動的に生成されます -->
                    </select>
                </div>
                <div class="form-group">
                    <label>ホーム</label>
                    <select id="modal-home" class="form-control">
                        <!-- ホーム選択肢は動的に生成されます -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="modal-cancel-btn">キャンセル</button>
                <button class="btn btn-save" id="modal-save-btn">保存</button>
            </div>
        </div>
    </div>

    <div class="app-container">

        <nav class="sidebar-left">
            <div class="form-group">
                <label for="home-select">表示ホーム</label>
                <select id="home-select">
                    <!-- ホーム選択肢は動的に生成されます -->
                </select>
            </div>

            <h3>シフト要望</h3>
            <ul class="shift-request-list" id="shift-request-list">
            </ul>
            <button class="btn btn-reflect-all" id="reflect-all-btn" onclick="bulkApproveShiftRequests()">すべて一括承認</button>
        </nav>

        <div class="main-wrapper">
            <header class="app-header">
                <a href="#" class="back-link">← 戻る</a>
                <div class="date-selector">
                    <select id="year-select">
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                    <span>年</span>
                    <select id="month-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                    <span>月</span>
                </div>
                <button class="btn btn-export" id="export-btn" onclick="exportShiftsToSheet()">📊 書き込み</button>
            </header>

            <main class="main-content">
                <div class="shift-table-container">
                    <table class="shift-table" id="shift-table">
                        <thead id="shift-table-header">
                            </thead>
                        <tbody id="shift-table-body">
                            </tbody>
                    </table>
                </div>

                <div class="daily-summary-header-bar">
                    <h3 class="daily-summary-title">ホーム別日次集計</h3>
                    <div class="daily-summary-home-selector">
                        <label for="daily-summary-home-select">集計対象：</label>
                        <select id="daily-summary-home-select">
                            <!-- ホーム選択肢は動的に生成されます -->
                            <option value="A">Aホーム</option>
                            <option value="B">Bホーム</option>
                            <option value="C">Cホーム</option>
                            <option value="D">Dホーム</option>
                            <option value="E">Eホーム</option>
                        </select>
                    </div>
                </div>
                <div class="summary-table-container" id="summary-table-container">
                    <table class="summary-table" id="daily-summary-table">
                        <thead id="daily-summary-header">
                            </thead>
                        <tbody id="daily-summary-body">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>

        <aside class="sidebar-right">
            <div class="summary-card">
                <div class="summary-card-header">
                    月間集計
                </div>
                <div class="summary-card-body">
                    <ul class="summary-list-group" id="monthly-summary">
                        </ul>
                </div>
            </div>

            <div class="summary-card">
                <div class="summary-card-header">
                    ホーム別月間合計
                </div>
                <div class="summary-card-body">
                    <ul class="summary-list-group home-summary-list" id="home-summary">
                        </ul>
                </div>
            </div>
        </aside>

    </div>

    <!-- API設定を先に読み込む -->
    <script src="config.js"></script>
    <!-- 認証スクリプト -->
    <script src="auth.js"></script>
    <!-- メインスクリプト -->
    <script src="script.js"></script>
    
    <script>
        // ページ読み込み時の認証チェック
        document.addEventListener('DOMContentLoaded', async () => {
            // ホーム選択肢を動的生成
            await populateHomeSelect(document.getElementById('home-select'), { includeAll: true });
            await populateHomeSelect(document.getElementById('modal-home'), { includeUndecided: true });
            await populateHomeSelect(document.getElementById('daily-summary-home-select'), { defaultValue: 'A' });

            // シフトコード選択肢をDBから生成
            await populateShiftCodes(document.getElementById('modal-shift-code'));
            
            // 認証チェック
            if (typeof PageRouter !== 'undefined') {
                const hasAccess = await PageRouter.checkPageAccess();
                if (!hasAccess) {
                    return; // 認証失敗時は処理を中断
                }
            }
            
            // ユーザー情報を表示
            const user = AUTH ? AUTH.getUser() : null;
            if (user) {
                console.log('👤 ログインユーザー:', user.name, `(${user.role})`);
            }
            
            // シフト表と日次集計のスクロール同期を設定
            setupScrollSync();
        });
        
        // 戻るボタンの動作を設定
        document.querySelector('.back-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.history.back();
        });
        
        // シフト表と日次集計のスクロール同期
        function setupScrollSync() {
            const shiftTableContainer = document.querySelector('.shift-table-container');
            const summaryTableContainer = document.getElementById('summary-table-container');
            
            let isSyncing = false;
            
            if (shiftTableContainer && summaryTableContainer) {
                shiftTableContainer.addEventListener('scroll', () => {
                    if (isSyncing) return;
                    isSyncing = true;
                    summaryTableContainer.scrollLeft = shiftTableContainer.scrollLeft;
                    requestAnimationFrame(() => { isSyncing = false; });
                });
                
                summaryTableContainer.addEventListener('scroll', () => {
                    if (isSyncing) return;
                    isSyncing = true;
                    shiftTableContainer.scrollLeft = summaryTableContainer.scrollLeft;
                    requestAnimationFrame(() => { isSyncing = false; });
                });
                
                console.log('✅ スクロール同期を設定しました');
            }
        }

        // シフトコード選択肢をDBから生成
        async function populateShiftCodes(selectEl) {
            if (!selectEl) return;
            try {
                const token = localStorage.getItem('shift_auth_token');
                const resp = await fetch(`${API_BASE_URL}/api/shift-codes`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await resp.json();
                if (!(data.success && Array.isArray(data.codes))) return;

                // 既存クリア
                selectEl.innerHTML = '';
                // コードを並び順で追加（表示は「A（日勤：8時間）」）
                data.codes.forEach(c => {
                    if (c.active !== false) {
                        const opt = document.createElement('option');
                        opt.value = c.code;
                        const hoursText = `${c.hours}時間`;
                        opt.textContent = `${c.code}（${c.label}：${hoursText}）`;
                        selectEl.appendChild(opt);
                    }
                });
                // 未定が存在しない場合は最後に追加
                if (![...selectEl.options].some(o => o.value === 'NONE')) {
                    const opt = document.createElement('option');
                    opt.value = 'NONE';
                    opt.textContent = 'NONE（未定：0時間）';
                    selectEl.appendChild(opt);
                }
            } catch (e) {
                console.error('❌ シフトコード選択肢生成エラー:', e);
            }
        }
    </script>
</body>
</html>
